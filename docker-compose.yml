version: "3.9"
services:
  db:
    image: mysql:8.0
    container_name: calendario_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - db_logs:/var/log/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - calendario-net
  
  backend:
    image: emanueleoi/calendario-backend:latest # <--- AGGIUNTO
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: calendario_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
    depends_on:
      - db
    ports:
      - "5000:5000"
    networks:
      - calendario-net
  
  frontend:
    image: emanueleoi/calendario-frontend:latest # <--- AGGIUNTO
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: calendario_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - calendario-net

volumes:
  db_data:
  db_logs:

networks:
  calendario-net:
    driver: bridge